kind = "web"
previewPath = "/"
title = "Vanta Studios"
version = "1.0.0"
id = "artifacts/vanta-studios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20634

[services.development]
run = "pnpm --filter @workspace/vanta-studios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vanta-studios", "run", "build" ]
publicDir = "artifacts/vanta-studios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20634"
BASE_PATH = "/"
